  <script>
    const STATES = {
      success: {
        icon: "fa-circle-check",
        title: "Email Verified!",
        message: "Thank you for confirming your email. You're officially signed up to volunteer — we'll be in touch soon with next steps.",
        btnText: "Back to Home",
        btnHref: "/index.html",
        cls: "status-success"
      },
      already: {
        icon: "fa-circle-check",
        title: "Already Verified",
        message: "Your email has already been confirmed. No further action is needed.",
        btnText: "Back to Home",
        btnHref: "/index.html",
        cls: "status-already"
      },
      expired: {
        icon: "fa-clock",
        title: "Link Expired",
        message: "This verification link has expired. Links are only valid for 24 hours. Please sign up again and we'll send you a fresh link.",
        btnText: "Sign Up Again",
        btnHref: "/volunteer.html",
        cls: "status-expired"
      },
      invalid: {
        icon: "fa-circle-xmark",
        title: "Invalid Link",
        message: "This verification link is not valid. It may have already been used or the URL may be incomplete.",
        btnText: "Back to Home",
        btnHref: "/index.html",
        cls: "status-invalid"
      },
      error: {
        icon: "fa-triangle-exclamation",
        title: "Something Went Wrong",
        message: "We couldn't process your verification right now. Please try again later or contact us if this keeps happening.",
        btnText: "Back to Home",
        btnHref: "/index.html",
        cls: "status-error"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const status = params.get("status") || "invalid";
    const state = STATES[status] || STATES.invalid;

    const card = document.getElementById("verify-card");
    card.classList.add(state.cls);
    card.innerHTML = `
      <span class="verify-icon"><i class="fas ${state.icon}"></i></span>
      <h1>${state.title}</h1>
      <p>${state.message}</p>
      <a class="btn" href="${state.btnHref}">${state.btnText}</a>
    `;
  </script>
